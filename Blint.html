<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clinton Goode — Portfolio</title>
<meta name="description" content="Content strategist, account lead, and creator partner. FaZe Clan, CORE/Adapt, Behave Modeling Agency.">

<meta property="og:type" content="website">

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080808;--s1:#101010;--s2:#161616;--s3:#1c1c1c;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --text:#f0ede8;--muted:#909090;--dim:#505050;
  --accent:#e8ff47;--faze:#ff4040;--core:#4090ff;--behave:#b8ff9f;
  --r:14px;--rs:8px;
  --spring:cubic-bezier(0.16,1,0.3,1);
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;font-weight:400;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:0;opacity:.5}
.wrap{position:relative;z-index:1;max-width:1120px;margin:0 auto;padding:0 36px}

/* ── HEADER ── */
header{padding:80px 0 52px;border-bottom:1px solid var(--border);margin-bottom:52px}
.header-inner{display:flex;align-items:flex-end;justify-content:space-between;gap:32px;flex-wrap:wrap}
.eyebrow{font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--dim);margin-bottom:12px}
.name-block{display:inline-flex;flex-wrap:wrap;gap:6px;align-items:baseline}
.name-first{background:var(--accent);color:#080808;padding:2px 16px 6px;border-radius:6px;display:inline-block;font-family:'Bebas Neue',sans-serif;font-size:clamp(60px,9vw,96px);line-height:.92;letter-spacing:.02em}
.name-last{color:var(--accent);font-family:'Bebas Neue',sans-serif;font-size:clamp(60px,9vw,96px);line-height:.92;letter-spacing:.02em}
.header-sub{font-size:13px;color:var(--muted);margin-top:12px;font-weight:300;letter-spacing:.02em}
.stat-row{display:flex;gap:36px;justify-content:flex-end}
.stat{text-align:left}
.stat-num{font-family:'Bebas Neue',sans-serif;font-size:38px;color:var(--accent);line-height:1}
.stat-label{font-size:10px;color:var(--dim);letter-spacing:.1em;text-transform:uppercase;margin-top:3px}

/* ── FILTERS ── */
.filter-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:52px;align-items:center}
.filter-label{font-size:10px;color:var(--dim);letter-spacing:.14em;text-transform:uppercase;margin-right:8px}
.filter-btn{font-family:'Outfit',sans-serif;font-size:12px;font-weight:500;padding:8px 20px;border-radius:999px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all .2s;letter-spacing:.02em}
.filter-btn:hover{border-color:var(--border2);color:var(--text);background:rgba(255,255,255,.04)}
.filter-btn.active{background:var(--accent);border-color:var(--accent);color:#080808;font-weight:600}

/* ── SECTION HEAD ── */
.section-head{display:flex;align-items:center;gap:14px;margin:60px 0 16px}
.sdot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.sname{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:.08em}
.sline{flex:1;height:1px;background:var(--border)}

/* ── CONTRIB BRIEF ── */
.contrib-brief{border-left:3px solid;border-radius:0 var(--rs) var(--rs) 0;padding:16px 20px 18px;margin-bottom:24px;background:var(--s1)}
.contrib-brief.bf{border-color:var(--faze)}
.contrib-brief.bc{border-color:var(--core)}
.contrib-eye{font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--dim);margin-bottom:6px}
.contrib-txt{font-size:13px;color:var(--muted);line-height:1.75;font-weight:300}
.contrib-txt strong{color:var(--text);font-weight:500}

/* ── CARD GRID ── */
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;margin-bottom:8px}

/* ── WORK CARD ── */
.work-card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;text-decoration:none;color:inherit;display:flex;flex-direction:column;cursor:pointer;
  transition:transform .25s ease,border-color .25s ease,box-shadow .25s ease,opacity .6s var(--spring)}
.work-card:hover{transform:translateY(-4px);border-color:var(--border2);box-shadow:0 24px 64px rgba(0,0,0,.55)}
.card-thumb{width:100%;aspect-ratio:16/9;position:relative;overflow:hidden;background:var(--s2);flex-shrink:0}
.card-thumb img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .35s ease}
.work-card:hover .card-thumb img{transform:scale(1.05)}
.thumb-overlay{position:absolute;inset:0;background:linear-gradient(0deg,rgba(0,0,0,.6) 0%,rgba(0,0,0,.1) 60%);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s}
.work-card:hover .thumb-overlay{opacity:1}
.play-btn{width:48px;height:48px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;transform:scale(.8);transition:transform .2s}
.work-card:hover .play-btn{transform:scale(1)}
.play-btn svg{width:18px;height:18px;fill:#080808;margin-left:3px}
.cat-badge{position:absolute;top:10px;left:10px;font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;padding:4px 10px;border-radius:999px;backdrop-filter:blur(12px)}
.cat-badge.bf{background:rgba(255,64,64,.2);color:#ff8888;border:1px solid rgba(255,64,64,.3)}
.cat-badge.bc{background:rgba(64,144,255,.2);color:#88bbff;border:1px solid rgba(64,144,255,.3)}
.thumb-fallback{width:100%;height:100%;display:none;align-items:center;justify-content:center;font-size:32px;background:var(--s3)}
.card-body{padding:16px 18px 20px;display:flex;flex-direction:column;flex:1}
.card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.card-tag{font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--dim)}
.ext-icon{opacity:0;transition:opacity .2s;color:var(--accent)}
.work-card:hover .ext-icon{opacity:1}
.ext-icon svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2}
.card-name{font-size:14px;font-weight:600;line-height:1.3;color:var(--text);margin-bottom:5px}
.card-concept{font-size:11px;font-weight:600;color:var(--accent);margin-bottom:8px;letter-spacing:.01em}
.card-desc{font-size:11.5px;color:var(--muted);line-height:1.65;font-weight:300;margin-bottom:12px}
.card-role{margin-top:auto;padding-top:12px;border-top:1px solid rgba(255,255,255,.06);display:flex;gap:8px;align-items:flex-start}
.role-diamond{color:var(--accent);font-size:9px;margin-top:2px;flex-shrink:0;line-height:1}
.role-label{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);display:block;margin-bottom:3px}
.role-detail{font-size:11px;color:var(--muted);line-height:1.6;font-weight:300}

/* ── BEHAVE ── */
.behave-block{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-top:16px}
.behave-header{padding:28px 32px 24px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;gap:20px;flex-wrap:wrap}
.bhv-logo{width:52px;height:52px;border-radius:12px;background:#0c1a09;border:1px solid rgba(184,255,159,.2);display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:.08em;color:var(--behave);flex-shrink:0}
.bhv-name{font-size:18px;font-weight:600;color:var(--text)}
.bhv-role{font-size:11px;color:var(--behave);margin-top:3px;letter-spacing:.06em;text-transform:uppercase;font-weight:600}
.bhv-tenure{font-size:10px;color:var(--dim);letter-spacing:.1em;text-transform:uppercase;padding:7px 16px;border:1px solid var(--border);border-radius:999px;white-space:nowrap;align-self:center}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);border-bottom:1px solid var(--border)}
.kpi-cell{padding:24px 24px 22px;border-right:1px solid var(--border);position:relative;overflow:hidden;transition:background .2s}
.kpi-cell:last-child{border-right:none}
.kpi-cell::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--behave);transform:scaleX(0);transform-origin:left;transition:transform .4s ease}
.kpi-cell:hover::after{transform:scaleX(1)}
.kpi-cell:hover{background:rgba(184,255,159,.03)}
.kpi-label{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--dim);margin-bottom:6px}
.kpi-value{font-family:'Bebas Neue',sans-serif;font-size:40px;letter-spacing:.02em;color:var(--text);line-height:1;margin-bottom:5px}
.kpi-value span{color:var(--behave)}
.kpi-sub{font-size:10.5px;color:var(--muted);line-height:1.5;font-weight:300}
.chart-area{padding:24px 28px;border-bottom:1px solid var(--border)}
.chart-label{font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--dim);margin-bottom:16px}
.bar-chart{display:flex;align-items:flex-end;gap:3px;height:90px}
.bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;height:100%;justify-content:flex-end;position:relative}
.bar{width:100%;border-radius:3px 3px 0 0;cursor:default;transform-origin:bottom center;transition:opacity .15s}
.bar-wrap:hover .bar{opacity:.7}
.bar-tooltip{position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:var(--s3);border:1px solid var(--border2);border-radius:6px;padding:4px 10px;font-size:10px;font-weight:600;color:var(--text);white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .15s;z-index:10}
.bar-wrap:hover .bar-tooltip{opacity:1}
.bar-yr{font-size:8px;color:var(--dim);letter-spacing:.04em;margin-top:5px;text-align:center;height:12px}
.growth-row{display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid var(--border)}
.growth-cell{padding:22px 28px}
.growth-cell:first-child{border-right:1px solid var(--border)}
.growth-eye{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--dim);margin-bottom:10px}
.growth-nums{display:flex;gap:28px;align-items:flex-end}
.g-num{font-family:'Bebas Neue',sans-serif;font-size:50px;line-height:1;color:var(--behave)}
.g-num.neutral{color:var(--text)}
.g-desc{font-size:11px;color:var(--muted);margin-top:4px;line-height:1.5;font-weight:300}
.bhv-pills{padding:18px 28px;display:flex;gap:8px;flex-wrap:wrap}
.bhv-pill{font-size:10px;font-weight:600;padding:5px 14px;border-radius:999px;border:1px solid rgba(184,255,159,.2);color:var(--behave);background:rgba(184,255,159,.05);letter-spacing:.04em}

/* ── TIKTOK ── */
.tiktok-block{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:28px 32px;display:block;text-decoration:none;color:inherit;transition:border-color .25s,box-shadow .25s,transform .25s;position:relative;overflow:hidden;margin-top:16px}
.tiktok-block::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--accent),transparent);opacity:0;transition:opacity .3s}
.tiktok-block:hover{border-color:rgba(232,255,71,.2);box-shadow:0 20px 60px rgba(0,0,0,.4);transform:translateY(-2px)}
.tiktok-block:hover::before{opacity:1}
.tiktok-top{display:flex;align-items:center;gap:16px;margin-bottom:20px}
.tiktok-icon{width:50px;height:50px;border-radius:12px;background:#000;display:flex;align-items:center;justify-content:center;flex-shrink:0;border:1px solid rgba(255,255,255,.1)}
.tiktok-icon svg{width:26px;height:26px}
.tiktok-handle{font-size:16px;font-weight:600}
.tiktok-platform{font-size:11px;color:var(--dim);margin-top:3px}
.poc-badge{font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;padding:6px 16px;border-radius:999px;background:rgba(232,255,71,.1);color:var(--accent);border:1px solid rgba(232,255,71,.25);margin-left:auto}
.tiktok-divider{height:1px;background:var(--border);margin-bottom:20px}
.tiktok-statement{font-size:13.5px;color:var(--muted);line-height:1.8;font-weight:300;max-width:780px;margin-bottom:20px}
.tiktok-statement strong{color:var(--text);font-weight:500}
.pill-row{display:flex;gap:8px;flex-wrap:wrap}
.pill{font-size:10px;font-weight:500;padding:5px 14px;border-radius:999px;border:1px solid var(--border);color:var(--dim);letter-spacing:.04em;transition:all .2s}
.pill:hover{border-color:var(--accent);color:var(--accent)}

/* ── FOOTER ── */
footer{margin-top:100px;padding:32px 0 52px;border-top:1px solid var(--border);text-align:center}
.footer-text{font-size:12px;color:var(--dim);letter-spacing:.06em}

/* ════════════════════════════════════════
   SCROLL ANIMATION SYSTEM
   CSS-driven — JS adds .is-visible
════════════════════════════════════════ */

/* Pre-animation states — set immediately, no flash */
.anim-fade-up{opacity:0;transform:translateY(12px);transition:opacity .6s var(--spring),transform .6s var(--spring)}
.anim-fade-up.is-visible{opacity:1;transform:translateY(0)}

/* KPI cells — individual fade-up with stagger via --delay var */
.anim-kpi{opacity:0;transform:translateY(12px);transition:opacity .6s var(--spring),transform .6s var(--spring);transition-delay:var(--delay,0ms)}
.anim-kpi.is-visible{opacity:1;transform:translateY(0)}

/* Number roll — shown immediately as static, JS replaces content */
.anim-num{display:inline}

/* Bars — grow from bottom via scaleY */
.bar{transform:scaleY(0);transform-origin:bottom center}
.bar.is-visible{transform:scaleY(1)}
/* Each bar gets its own transition-delay via --bar-delay inline style */

/* Growth numbers */
.anim-gnum{opacity:0;transform:translateY(10px);transition:opacity .6s var(--spring),transform .6s var(--spring);transition-delay:var(--delay,0ms)}
.anim-gnum.is-visible{opacity:1;transform:translateY(0)}

/* Contrib brief */
.anim-contrib{opacity:0;transform:translateY(12px);transition:opacity .6s var(--spring),transform .6s var(--spring)}
.anim-contrib.is-visible{opacity:1;transform:translateY(0)}

/* Cards — stagger handled via inline transition-delay */
.work-card{opacity:0;transform:translateY(12px)}
.work-card.is-visible{opacity:1;transform:translateY(0)}
/* Override hover so it works after visible */
.work-card.is-visible:hover{transform:translateY(-4px)}

/* TikTok block */
.anim-block{opacity:0;transform:translateY(12px);transition:opacity .6s var(--spring),transform .6s var(--spring)}
.anim-block.is-visible{opacity:1;transform:translateY(0)}

/* Pills stagger */
.anim-pill{opacity:0;transform:translateY(8px);transition:opacity .5s var(--spring),transform .5s var(--spring);transition-delay:var(--delay,0ms)}
.anim-pill.is-visible{opacity:1;transform:translateY(0)}

/* ── REDUCED MOTION — skip all, show final states ── */
@media(prefers-reduced-motion:reduce){
  .anim-fade-up,.anim-kpi,.anim-gnum,.anim-contrib,.work-card,.anim-block,.anim-pill{
    opacity:1!important;transform:none!important;transition:none!important
  }
  .bar{transform:scaleY(1)!important;transition:none!important}
}

/* ── RESPONSIVE ── */
@media(max-width:700px){
  .wrap{padding:0 20px}
  header{padding:52px 0 36px}
  .header-inner{flex-direction:column;align-items:flex-start}
  .stat-row{justify-content:flex-start;gap:24px}
  .card-grid{grid-template-columns:1fr}
  .kpi-grid{grid-template-columns:repeat(2,1fr)}
  .kpi-cell{border-bottom:1px solid var(--border)}
  .growth-row{grid-template-columns:1fr}
  .growth-cell:first-child{border-right:none;border-bottom:1px solid var(--border)}
  .behave-header{padding:20px}
  .chart-area{padding:18px 20px}
  .bhv-pills{padding:16px 20px}
  .tiktok-block{padding:20px}
  .tiktok-top{flex-wrap:wrap}
  .poc-badge{margin-left:0}
}
</style>
</head>

const contributions = {
  faze: `Every piece of FaZe content I touched required more than showing up on set. I was <strong>embedded in the process</strong> — identifying which moments were worth building around, shaping the creative angle, and making sure execution landed with the audience that mattered. Whether it was recognizing that Rain's recovery was a story the world needed to see, or knowing exactly how to frame a brand deal so it didn't feel like one, my contribution lived in the <strong>strategy before the camera ever rolled</strong> and in the judgment calls made while it was running.`,
  core: `With Adapt and the CORE crew, my job was helping <strong>translate who they genuinely are into content that hit beyond their existing audience</strong>. I identified the lifestyle angles — basketball, collectibles, anime, events — that could expand their identity without losing authenticity. I was involved in <strong>concept development, talent coordination, and ecosystem thinking</strong> — making sure each piece served a purpose in the larger content strategy, not just as a one-off upload.`

const works = [
  { title:'FaZe Rain — First Steps', tag:'Documentary', category:'faze', url:'https://www.youtube.com/watch?v=eDG4FKodokE', vid:'eDG4FKodokE', concept:'Vulnerability as virality', desc:"Rain's first public steps after his near-fatal health scare. Turned a deeply personal milestone into one of the most emotional pieces in gaming content history.", roleLabel:'Strategy · Concept', roleDetail:"Recognized this as a landmark cultural moment before it was treated as one. Pushed for raw, unfiltered documentation — the restraint is what made it resonate." },
  { title:'FaZe Rain — Custom Wheelchair', tag:'Documentary', category:'faze', url:'https://www.youtube.com/watch?v=MrSsxu4_Fis', vid:'MrSsxu4_Fis', concept:'Community rallying around a member', desc:'FaZe builds Rain a fully custom electric wheelchair. Reinforced the idea that FaZe is a family, not just a brand — content with real emotional stakes.', roleLabel:'Talent Development · In the Trenches', roleDetail:'Coordinated the talent involved and shaped the narrative framing — positioning this as a community story, not a charity piece. Kept the tone human from concept through execution.' },
  { title:'FaZe Clan Goes Public', tag:'Milestone', category:['faze','brand'], url:'https://www.youtube.com/watch?v=EZXmIdXZNBg', vid:'EZXmIdXZNBg', concept:'Historic moment, creator-first framing', desc:"Capturing FaZe's NYSE listing in a way that felt celebratory and human — not corporate. Making a Wall Street event feel meaningful to a Gen Z gaming audience.", roleLabel:'Strategy · Concept', roleDetail:"Advised on how to frame the NYSE moment so it landed with the fanbase rather than shareholders. The angle needed to feel like a win for the culture, not a press release." },

// ════════════════════════════════════════
// ANIMATION ENGINE
// ════════════════════════════════════════
const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

// Single shared IntersectionObserver
const observed = new Set();
const io = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (!entry.isIntersecting) return;
    const el = entry.target;
    if (observed.has(el)) return;
    observed.add(el);
    io.unobserve(el);

    const type = el.dataset.animType;

    if (type === 'num') {
      animateNumber(el);
    } else if (type === 'bar-group') {
      animateBarGroup(el);
    } else if (type === 'counter-group') {
      // kpi values inside behave
      el.querySelectorAll('[data-kpi]').forEach((kpiEl, i) => {
        setTimeout(() => animateNumber(kpiEl), i * 120);
      });
    } else {
      el.classList.add('is-visible');
    }
  });
}, {
  threshold: 0.2,
  rootMargin: '0px 0px -40px 0px'
});

function observe(el, type) {
  if (reducedMotion) { el.classList.add('is-visible'); return; }
  el.dataset.animType = type || 'default';
  io.observe(el);
}

// ── NUMBER ROLL-UP ──
// Parses prefix, number, suffix from data attributes
// Animates only the numeric portion with spring easing
function animateNumber(el) {
  if (reducedMotion) return;
  const target  = parseFloat(el.dataset.count);
  const prefix  = el.dataset.prefix  || '';
  const suffix  = el.dataset.suffix  || '';
  const decimal = el.dataset.decimal === 'true';
  const dur     = parseFloat(el.dataset.dur) || 1400; // ms
  const start   = performance.now();

  // Spring ease approximation: f(t) = 1 - (1-t)^3 * cos(t*π*2.5)
  // We use a simpler parametric that matches cubic-bezier(0.16,1,0.3,1)
  function springEase(t) {
    return 1 - Math.pow(1 - t, 4) * (1 + 2.2 * t);
  }

  function tick(now) {
    const elapsed = now - start;
    const t = Math.min(elapsed / dur, 1);
    const eased = springEase(t);
    const current = target * eased;

    if (t < 1) {
      el.textContent = prefix + (decimal ? current.toFixed(1) : Math.floor(current)) + suffix;
      requestAnimationFrame(tick);
    } else {
      // Snap to exact final formatted value
      el.textContent = prefix + (decimal ? target.toFixed(1) : Math.floor(target)) + suffix;
    }
  }

  el.textContent = prefix + '0' + suffix;
  requestAnimationFrame(tick);
}

// ── BAR GROUP ANIMATION ──
function animateBarGroup(groupEl) {
  if (reducedMotion) {
    groupEl.querySelectorAll('.bar').forEach(b => b.classList.add('is-visible'));
    return;
  }
  const bars = groupEl.querySelectorAll('.bar');
  bars.forEach((bar, i) => {
    const delay = i * 22; // 22ms stagger — tight enough to feel grouped
    bar.style.transitionProperty = 'transform';
    bar.style.transitionDuration = '1s';
    bar.style.transitionTimingFunction = 'cubic-bezier(0.16,1,0.3,1)';
    bar.style.transitionDelay = delay + 'ms';
    // Force reflow then add class
    requestAnimationFrame(() => {
      requestAnimationFrame(() => bar.classList.add('is-visible'));
    });
  });
}

// ── OBSERVE HELPER — called after each render ──
function attachObservers() {
  // Fade-up generics
  document.querySelectorAll('.anim-fade-up:not([data-observed])').forEach(el => {
    el.dataset.observed = '1';
    observe(el, 'default');
  });
  // KPI cells
  document.querySelectorAll('.anim-kpi:not([data-observed])').forEach(el => {
    el.dataset.observed = '1';
    observe(el, 'default');
  });
  // Growth numbers
  document.querySelectorAll('.anim-gnum:not([data-observed])').forEach(el => {
    el.dataset.observed = '1';
    if (reducedMotion) { el.classList.add('is-visible'); return; }
    io.observe(el);
    el.dataset.animType = 'default';
  });
  // Behave KPI numbers (data-kpi)
  document.querySelectorAll('[data-kpi]:not([data-observed])').forEach(el => {
    el.dataset.observed = '1';
    observe(el, 'num');
  });
  // Header stat nums
  document.querySelectorAll('.stat-num[data-count]:not([data-observed])').forEach(el => {
    el.dataset.observed = '1';
    observe(el, 'num');
  });
  // Bar chart group
  document.querySelectorAll('.bar-chart:not([data-observed])').forEach(el => {
    el.dataset.observed = '1';
    observe(el, 'bar-group');
  });
  // Contrib briefs
  document.querySelectorAll('.anim-contrib:not([data-observed])').forEach(el => {
    el.dataset.observed = '1';
    observe(el, 'default');
  });
  // Cards
  document.querySelectorAll('.work-card:not([data-observed])').forEach((el, i) => {
    el.dataset.observed = '1';
    if (reducedMotion) { el.classList.add('is-visible'); return; }
    el.style.transitionProperty = 'opacity, transform, border-color, box-shadow';
    el.style.transitionDuration = '.6s, .6s, .25s, .25s';
    el.style.transitionTimingFunction = 'cubic-bezier(0.16,1,0.3,1)';
    el.style.transitionDelay = (i % 3) * 60 + 'ms'; // 3-col stagger
    io.observe(el);
    el.dataset.animType = 'default';
  });
  // Blocks (tiktok etc)
  document.querySelectorAll('.anim-block:not([data-observed])').forEach(el => {
    el.dataset.observed = '1';
    observe(el, 'default');
  });
  // Pills
  document.querySelectorAll('.anim-pill:not([data-observed])').forEach(el => {
    el.dataset.observed = '1';
    observe(el, 'default');
  });
}

    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    render(activeFilter);
  });
});

// Header stat nums — observe immediately on load
document.querySelectorAll('.stat-num[data-count]').forEach(el => {
  observe(el, 'num');
});

render('all');
</script>
</body>
</html>
